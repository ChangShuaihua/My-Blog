name: 自动部署博客
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 官方正版稳定v4版本，可正常解析，不再报找不到版本错误
      - name: 拉取项目代码
        uses: actions/checkout@v4

      # 官方正版稳定v4版本，无无效参数、可正常解析
      - name: 安装Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'

      # 【核心修复：安装pnpm + 强制刷新系统环境PATH】
      # 彻底解决云端 Unable to locate executable file: pnpm 找不到pnpm错误
      # 彻底删除了报错的 package-manager: pnpm 无效参数
      - name: 安装pnpm包管理器
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          echo "$HOME/.node/corepack" >> $GITHUB_PATH

      - name: 安装项目依赖
        run: pnpm install

      - name: 项目打包构建
        run: pnpm build

      # 你原本的GitHub Pages部署逻辑完全不动保留
      - name: 部署到Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist