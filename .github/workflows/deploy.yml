name: 部署博客
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'

      # 核心修复：自动安装 pnpm，解决找不到 pnpm 报错
      - name: 安装 pnpm 包管理器
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: 安装项目依赖
        run: pnpm install

      - name: 构建打包项目
        run: pnpm build

      # 部署到 GitHub Pages（通用静态博客部署，适配绝大多数博客）
      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist