name: 自动部署博客
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 官方稳定v4版本，可正常解析，无版本不存在错误
      - name: 拉取项目代码
        uses: actions/checkout@v4

      # 官方稳定v4 Node环境，无任何无效参数
      - name: 安装Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      # 重点：全部改用npm！云端原生自带，再也不会报找不到pnpm错误
      - name: 安装项目依赖
        run: npm install

      # npm打包构建（和你本地pnpm build效果完全一致）
      - name: 项目打包构建
        run: npm run build

      # 你原本的GitHub Pages部署逻辑完全不动保留
      - name: 部署到Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist