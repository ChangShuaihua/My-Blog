name: 自动部署博客
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 升级v6新版，彻底解决Node20废弃警告
      - name: 拉取代码
        uses: actions/checkout@v6

      # 升级v6新版，原生支持pnpm，不再有无效参数报错
      - name: 安装Node.js环境
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'pnpm'

      # 安装依赖（云端已自动装好pnpm，不再报错）
      - name: 安装项目依赖
        run: pnpm install

      # 打包构建
      - name: 项目打包构建
        run: pnpm build

      # 部署到GitHub Pages（你原本的部署逻辑完全保留）
      - name: 部署到Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist