name: Deploy Next.js Blog to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 【核心修复】安装pnpm，识别你的pnpm-lock.yaml锁文件，解决最开始的Dependencies lock file报错
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: true

      # 3. 安装Node.js环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # 4. Next.js打包构建
      - name: Build project
        run: |
          pnpm install
          pnpm build

      # 5. 【真实可用部署Action】部署到GitHub Pages（替换掉错误的xxx占位符）
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out