name: Deploy Next.js Blog to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      # setup node22 + pnpm缓存
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Build project
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          # 新增：放行所有依赖构建脚本，解决 ERR_PNPM_IGNORED_BUILDS 报错
          PNPM_CONFIG_ALLOW_BUILDS: true
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
